<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Security JWT Demo</title>
    <!-- Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle Background Animation */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 60%);
            animation: pulse 15s linear infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #e2e8f0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: var(--bg-color);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            border-radius: 0.5rem;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button.success { background: var(--success); }
        button.success:hover { background: #059669; }

        .response-area {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
            background: #0f172a;
            border: 1px solid var(--border);
            font-family: monospace;
            font-size: 0.875rem;
            color: var(--success);
            min-height: 80px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .error-text { color: var(--danger); }
        .success-text { color: var(--success); }

        .full-width { grid-column: 1 / -1; }
        
        .token-display {
            font-family: monospace;
            color: #a78bfa;
            word-break: break-all;
        }
        
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>🔐 Spring Security JWT Console</h1>

    <div class="container">
        
        <!-- Registration Card -->
        <div class="card">
            <h2>1. Register New User</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-user" placeholder="e.g. testuser123">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-pass" placeholder="Enter password">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="reg-role">
                    <option value="user">USER</option>
                    <option value="admin">ADMIN</option>
                </select>
            </div>
            <button onclick="register()">Register</button>
            <div id="reg-res" class="response-area">Awaiting action...</div>
        </div>

        <!-- Login Card -->
        <div class="card">
            <h2>2. Login (Get JWT Token)</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-user" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="Enter password">
            </div>
            <button class="success" onclick="login()">Login & Fetch Token</button>
            <div id="login-res" class="response-area">Awaiting action...</div>
        </div>

        <!-- Test Endpoints Card -->
        <div class="card full-width">
            <h2>3. Test Role-Based Endpoints (RBAC)</h2>
            <p style="color: var(--text-secondary); margin-bottom: 1rem; font-size: 0.875rem;">
                The JWT token stored from Login is automatically attached to requests below.
            </p>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem;">
                <button onclick="testRoute('/api/test/all')" style="background: #64748b;">Public Route (/api/test/all)</button>
                <button onclick="testRoute('/api/test/user')" style="background: #3b82f6;">User Route (/api/test/user)</button>
                <button onclick="testRoute('/api/test/admin')" style="background: #8b5cf6;">Admin Route (/api/test/admin)</button>
            </div>

            <div id="test-res" class="response-area" style="min-height: 120px; font-size: 1rem;">Server Response will appear here...</div>
        </div>

    </div>

    <script>
        let currentToken = null;

        function setRes(id, msg, isError = false) {
            const el = document.getElementById(id);
            el.innerHTML = `<span class="${isError ? 'error-text' : 'success-text'}">${msg}</span>`;
        }

        async function register() {
            setRes('reg-res', 'Registering...');
            const u = document.getElementById('reg-user').value;
            const p = document.getElementById('reg-pass').value;
            const r = document.getElementById('reg-role').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({username: u, password: p, roles: [r]})
                });
                const text = await res.text();
                if(!res.ok) throw new Error(text);
                setRes('reg-res', `Success: ${text}`);
            } catch(e) {
                setRes('reg-res', `Error: ${e.message}`, true);
            }
        }

        async function login() {
            setRes('login-res', 'Authenticating...');
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                if(!res.ok) throw new Error('Invalid credentials');
                const data = await res.json();
                currentToken = data.token;
                setRes('login-res', `Login Successful!\nRole: ${data.roles.join(', ')}\n\nToken Cached:\n<span class="token-display">${data.token}</span>`);
            } catch(e) {
                setRes('login-res', `Error: ${e.message}`, true);
                currentToken = null;
            }
        }

        async function testRoute(route) {
            setRes('test-res', `Fetching ${route}...`);
            const headers = {};
            if(currentToken) {
                headers['Authorization'] = `Bearer ${currentToken}`;
            }

            try {
                const res = await fetch(route, { headers });
                const text = await res.text();
                
                if(!res.ok) {
                    if(res.status === 401) throw new Error('401 Unauthorized - No Valid Token Provided');
                    if(res.status === 403) throw new Error('403 Forbidden - Your Role is not permitted here');
                    throw new Error(text);
                }
                
                setRes('test-res', `[200 OK] Response:\n\n${text}`);
            } catch(e) {
                setRes('test-res', `[ACCESS DENIED]\n\n${e.message}`, true);
            }
        }
    </script>
</body>
</html>
